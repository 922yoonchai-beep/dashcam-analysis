<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行车记录仪 - 售后与运营数据分析面板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #2c3e50; margin-bottom: 5px;}
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; width: calc(50% - 30px); min-width: 400px; box-sizing: border-box; }
        .full-width { width: 100%; }
        .section { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;}
        .import-section { background: #e8f8f5; border: 2px dashed #1abc9c; flex-direction: column; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; padding: 10px 15px;}
        button:hover { background-color: #2980b9; }
        .export-btn { background-color: #27ae60; margin-top: 15px; width: 100%; }
        .export-btn:hover { background-color: #2ecc71; }
        .action-btn { background-color: #e67e22; font-size: 16px; padding: 10px 20px; margin-left: 10px;}
        .action-btn:hover { background-color: #d35400; }
        .report-box { display: none; background: #fff3e0; border-left: 5px solid #e67e22; padding: 20px; margin-bottom: 20px; border-radius: 4px; line-height: 1.6;}
        canvas { max-width: 100%; background-color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>行车记录仪 VOC 智能数据分析系统</h1>
        <p>动态自适应图表 | 一键导入分析 | 自动生成年度总结报告</p>
    </div>

    <div class="section import-section">
        <h3 style="margin: 0; color: #16a085;">📊 第一步：批量导入历史客诉数据</h3>
        <p style="font-size: 14px; color: #555; margin: 5px 0 15px 0;">注：Excel 表头必须包含【月份】【型号】【问题类型】【数量】</p>
        <div>
            <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="display: none;" onchange="handleFileUpload(event)">
            <button class="export-btn" style="width:auto; margin-top:0;" onclick="document.getElementById('excelFile').click()">📂 选择 Excel 导入</button>
            <button class="action-btn" onclick="generateReport()">📝 一键生成深度报告</button>
            <button class="export-btn" style="background-color:#95a5a6; width:auto; margin-top:0; margin-left:10px;" onclick="clearData()">🗑️ 清空数据</button>
        </div>
        <p id="uploadStatus" style="font-size: 14px; color: #e74c3c; margin-bottom: 0; font-weight: bold;"></p>
    </div>

    <div id="reportBox" class="report-box">
        <h2 style="margin-top:0; color:#d35400;">📑 售后数据深度洞察报告</h2>
        <div id="reportContent" style="font-size: 15px; color:#333;"></div>
    </div>

    <div class="section">
        <strong>📅 切换查看图表月份：</strong>
        <select id="monthFilter" onchange="renderCharts()" style="font-weight: bold; color: #e74c3c;">
            <option value="全部">🔍 查看全年累计数据</option>
            <option value="1月">1月</option><option value="2月">2月</option><option value="3月">3月</option><option value="4月">4月</option><option value="5月">5月</option><option value="6月">6月</option><option value="7月">7月</option><option value="8月">8月</option><option value="9月">9月</option><option value="10月">10月</option><option value="11月">11月</option><option value="12月">12月</option>
        </select>
    </div>

    <div class="container">
        <div class="card full-width">
            <h3 id="barTitle">多型号 SKU 客诉矩阵对比 (动态生成)</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="card">
            <h3 id="pieTitle">核心差评原因归类占比</h3>
            <canvas id="pieChart"></canvas>
        </div>
        <div class="card">
            <h3>全年各月整体客诉趋势图</h3>
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <script>
        let allRecords = [];
        const allMonths = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        // 准备充足的颜色库，应对几十种不同型号
        const colorPalette = ['#3498db','#2ecc71','#e74c3c','#f1c40f','#9b59b6','#e67e22','#1abc9c','#34495e','#95a5a6','#d35400','#c0392b','#8e44ad','#2980b9','#27ae60'];

        // 智能分类算法
        function getIssueCategory(issue) {
            if (!issue) return '其他';
            if (issue.includes('死机') || issue.includes('黑屏') || issue.includes('不亮') || issue.includes('松动') || issue.includes('不开机') || issue.includes('冻结')) return '核心硬件故障';
            if (issue.includes('连不上') || issue.includes('重置') || issue.includes('漏秒') || issue.includes('模式') || issue.includes('不录制') || issue.includes('WiFi') || issue.includes('GPS')) return '固件与软件Bug';
            if (issue.includes('支架') || issue.includes('配件') || issue.includes('线') || issue.includes('卡报错') || issue.includes('损坏') || issue.includes('丢失')) return '配件及组装';
            return '画质与体验问题';
        }

        const bgPlugin = { id: 'bg', beforeDraw: (c) => { const ctx = c.ctx; ctx.save(); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,c.width,c.height); ctx.restore(); } };

        let barChart = new Chart(document.getElementById('barChart').getContext('2d'), { type: 'bar', data: { labels: [], datasets: [] }, options: { scales: { y: { beginAtZero: true } }, responsive: true }, plugins: [bgPlugin] });
        let pieChart = new Chart(document.getElementById('pieChart').getContext('2d'), { type: 'pie', data: { labels: ['核心硬件故障', '固件与软件Bug', '配件及组装', '画质与体验问题'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#e74c3c', '#f1c40f', '#e67e22', '#3498db'] }] }, plugins: [bgPlugin] });
        let lineChart = new Chart(document.getElementById('lineChart').getContext('2d'), { type: 'line', data: { labels: allMonths, datasets: [{ label: '全系总客诉量', data: Array(12).fill(0), borderColor: '#3498db', tension: 0.1 }] }, options: { scales: { y: { beginAtZero: true } } }, plugins: [bgPlugin] });

        function renderCharts() {
            const selectedMonth = document.getElementById('monthFilter').value;
            const filteredRecords = selectedMonth === '全部' ? allRecords : allRecords.filter(r => r.month === selectedMonth);

            // 1. 动态生成柱状图的 X轴(问题) 和 数据集(型号)
            const uniqueIssues = [...new Set(filteredRecords.map(r => r.issue))];
            const uniqueModels = [...new Set(filteredRecords.map(r => r.model))];
            
            barChart.data.labels = uniqueIssues;
            barChart.data.datasets = uniqueModels.map((modelName, index) => {
                const dataArr = uniqueIssues.map(issueName => {
                    return filteredRecords.filter(r => r.model === modelName && r.issue === issueName).reduce((sum, r) => sum + r.count, 0);
                });
                return {
                    label: modelName,
                    data: dataArr,
                    backgroundColor: colorPalette[index % colorPalette.length]
                };
            });
            barChart.update();

            // 2. 更新扇形图
            const pieDataMap = { '核心硬件故障': 0, '固件与软件Bug': 0, '配件及组装': 0, '画质与体验问题': 0 };
            filteredRecords.forEach(r => { 
                const cat = getIssueCategory(r.issue);
                if(pieDataMap[cat] !== undefined) pieDataMap[cat] += r.count; 
            });
            pieChart.data.datasets[0].data = Object.values(pieDataMap);
            pieChart.update();

            // 3. 更新曲线图
            const lineData = Array(12).fill(0);
            allRecords.forEach(r => {
                const monthIdx = allMonths.indexOf(r.month);
                if (monthIdx > -1) lineData[monthIdx] += r.count;
            });
            lineChart.data.datasets[0].data = lineData;
            lineChart.update();
        }

        function generateReport() {
            if (allRecords.length === 0) return alert("暂无数据，请先导入表格！");
            
            let totalComplaints = 0;
            let modelCount = {};
            let issueCount = {};
            let monthCount = {};

            allRecords.forEach(r => {
                totalComplaints += r.count;
                modelCount[r.model] = (modelCount[r.model] || 0) + r.count;
                issueCount[r.issue] = (issueCount[r.issue] || 0) + r.count;
                monthCount[r.month] = (monthCount[r.month] || 0) + r.count;
            });

            const worstModel = Object.keys(modelCount).reduce((a, b) => modelCount[a] > modelCount[b] ? a : b);
            const worstIssue = Object.keys(issueCount).reduce((a, b) => issueCount[a] > issueCount[b] ? a : b);
            const worstMonth = Object.keys(monthCount).reduce((a, b) => monthCount[a] > monthCount[b] ? a : b);
            const hardwareCount = allRecords.filter(r => getIssueCategory(r.issue) === '核心硬件故障').reduce((sum, r) => sum + r.count, 0);
            const hardwarePercent = totalComplaints > 0 ? ((hardwareCount / totalComplaints) * 100).toFixed(1) : 0;

            const reportHtml = `
                <p>💡 <b>整体概况：</b>系统共捕获 <b>${totalComplaints}</b> 条有效售后记录。客诉爆发最高峰出现在 <b>${worstMonth}</b>（共计 ${monthCount[worstMonth]} 条）。</p>
                <p>🚨 <b>高危型号预警：</b>全系产品中表现最不稳定的型号是 <b>${worstModel}</b>（累计 ${modelCount[worstModel]} 条投诉），建议立刻锁定该 SKU 的近期出货批次并拉取工厂质检报告进行溯源。</p>
                <p>🔧 <b>核心致命缺陷：</b>用户反馈最密集的痛点是 <b>“${worstIssue}”</b>（发生 ${issueCount[worstIssue]} 次）。同时，归属于“核心硬件故障”的问题整体占比高达 <b>${hardwarePercent}%</b>，证明主板或排线等物理硬件仍是我们降低退单率的最大阻碍。</p>
                <p>📌 <b>运营侧应对策略：</b>针对“${worstIssue}”，建议前端运营立即在 Listing 的 Q&A、五点描述和 A+ 页面增加相关防雷说明或排障指导视频；后端同步发起工程变更请求(ECN)，协同供应链定向解决该缺陷。</p>
            `;
            document.getElementById('reportContent').innerHTML = reportHtml;
            document.getElementById('reportBox').style.display = 'block';
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            document.getElementById('uploadStatus').innerText = "正在智能解析数据中...";
            document.getElementById('uploadStatus').style.color = "#f39c12";

            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    let successCount = 0;

                    jsonData.forEach(row => {
                        // 智能纠错：如果月份只写了数字，自动加上"月"
                        let month = row['月份'] ? row['月份'].toString().trim() : '2月';
                        if (!month.endsWith('月')) month += '月';

                        const model = row['型号'] ? row['型号'].toString().trim().toUpperCase() : null; // 自动转大写对齐
                        const issue = row['问题类型'] ? row['问题类型'].toString().trim() : null;
                        const count = row['数量'] ? parseInt(row['数量']) : 1;

                        if (model && issue) {
                            allRecords.push({ month, model, issue, count });
                            successCount++;
                        }
                    });

                    renderCharts(); 
                    document.getElementById('uploadStatus').innerHTML = `✅ 成功解析！已从表格中载入 <b>${successCount}</b> 条记录。图表已自动生成！`;
                    document.getElementById('uploadStatus').style.color = "#27ae60";
                } catch (error) {
                    document.getElementById('uploadStatus').innerText = "❌ 解析失败，请检查 Excel 表头是否严格写着：月份、型号、问题类型、数量";
                    document.getElementById('uploadStatus').style.color = "#e74c3c";
                }
                event.target.value = ''; 
            };
            reader.readAsArrayBuffer(file);
        }

        function clearData() {
            allRecords = [];
            renderCharts();
            document.getElementById('reportBox').style.display = 'none';
            document.getElementById('uploadStatus').innerText = "🗑️ 数据已清空，请重新导入。";
            document.getElementById('uploadStatus').style.color = "#7f8c8d";
        }
    </script>
</body>
</html>
