<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行车记录仪 - 售后与运营数据分析面板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #2c3e50; margin-bottom: 5px;}
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; width: calc(50% - 30px); min-width: 400px; box-sizing: border-box; position: relative; }
        .full-width { width: 100%; }
        .section { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;}
        .import-section { background: #e8f8f5; border: 2px dashed #1abc9c; flex-direction: column; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; padding: 10px 15px;}
        button:hover { background-color: #2980b9; }
        .export-btn { background-color: #27ae60; margin-top: 15px; width: 100%; }
        .export-btn:hover { background-color: #2ecc71; }
        .action-btn { background-color: #e67e22; font-size: 16px; padding: 10px 20px; margin-left: 10px;}
        .action-btn:hover { background-color: #d35400; }
        .report-box { display: none; background: #fff3e0; border-left: 5px solid #e67e22; padding: 20px; margin-bottom: 20px; border-radius: 4px; line-height: 1.6;}
        canvas { max-width: 100%; background-color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>行车记录仪 VOC 智能数据分析系统</h1>
        <p>多维时间轴对比 | 一键导入分析 | 自动生成年度总结报告</p>
    </div>

    <div class="section import-section">
        <h3 style="margin: 0; color: #16a085;">📊 第一步：批量导入历史客诉数据</h3>
        <p style="font-size: 14px; color: #555; margin: 5px 0 15px 0;">注：Excel 表头必须包含【月份】【型号】【问题类型】【数量】</p>
        <div>
            <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="display: none;" onchange="handleFileUpload(event)">
            <button class="export-btn" style="width:auto; margin-top:0;" onclick="document.getElementById('excelFile').click()">📂 选择 Excel 导入</button>
            <button class="action-btn" onclick="generateReport()">📝 一键生成年度报告分析</button>
        </div>
        <p id="uploadStatus" style="font-size: 14px; color: #e74c3c; margin-bottom: 0; font-weight: bold;"></p>
    </div>

    <div id="reportBox" class="report-box">
        <h2 style="margin-top:0; color:#d35400;">📑 年度/全局售后数据深度分析报告</h2>
        <div id="reportContent" style="font-size: 15px; color:#333;"></div>
    </div>

    <div class="section">
        <strong>📅 切换查看图表月份：</strong>
        <select id="monthFilter" onchange="renderCharts()" style="font-weight: bold; color: #e74c3c;">
            <option value="全部">🔍 查看全年累计数据</option>
            <option value="1月">1月</option><option value="2月">2月</option>
            <option value="3月">3月</option><option value="4月">4月</option>
            <option value="5月">5月</option><option value="6月">6月</option>
            <option value="7月">7月</option><option value="8月">8月</option>
            <option value="9月">9月</option><option value="10月">10月</option>
            <option value="11月">11月</option><option value="12月">12月</option>
        </select>
        
        <span style="margin-left: 20px; color:#ccc;">|</span>
        
        <strong style="margin-left: 20px;">✍️ 手动录入单条：</strong>
        <select id="inputMonth"><option value="2月">2月</option><option value="3月">3月</option></select>
        <select id="inputModel"><option value="N5">N5</option><option value="N5 PRO">N5 PRO</option><option value="N6">N6</option><option value="N7">N7</option><option value="IK7">IK7</option><option value="IK9">IK9</option><option value="IK11">IK11</option><option value="Q5">Q5</option><option value="Q7">Q7</option></select>
        <select id="inputIssue"><option value="死机/重启">死机/重启</option><option value="连不上WiFi">连不上WiFi</option><option value="通电黑屏">通电黑屏</option><option value="漏秒/未录制">漏秒/未录制</option><option value="内存卡报错">内存卡报错</option><option value="夜视模糊">夜视模糊</option><option value="GPS故障">GPS故障</option><option value="后拉黑屏">后拉黑屏</option><option value="支架不稳">支架不稳</option><option value="其他故障">其他故障</option></select>
        <input type="number" id="inputCount" placeholder="数量" min="1" value="1" style="width: 60px;">
        <button onclick="addManualData()">录入</button>
    </div>

    <div class="container">
        <div class="card full-width">
            <h3 id="barTitle">多型号 SKU 客诉矩阵对比 (全年)</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="card">
            <h3 id="pieTitle">核心差评原因归类占比 (全年)</h3>
            <canvas id="pieChart"></canvas>
        </div>
        <div class="card">
            <h3>全年各月整体客诉趋势图</h3>
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <script>
        // --- 核心全局数据存储 ---
        // 我们用一个数组保存所有的每一条记录： { month: '2月', model: 'N5', issue: '死机/重启', count: 1 }
        let allRecords = [];

        // 配置项
        const models = ['N5', 'N5 PRO', 'N6', 'N7', 'IK7', 'IK9', 'IK11', 'Q5', 'Q7'];
        const issues = ['死机/重启', '夜视模糊', '内存卡报错', '支架不稳', '漏秒/未录制', '后拉黑屏', '时间重置', '接口松动', '车充不亮灯', '配件丢失', '接降压线异常', 'carplay模式用不了', '通电黑屏', '连不上WiFi', 'GPS故障', '其他故障'];
        const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        const modelColors = ['#3498db','#2ecc71','#9b59b6','#f1c40f','#e67e22','#e74c3c','#1abc9c','#34495e','#95a5a6'];

        // 问题分类映射函数（用于扇形图）
        function getIssueCategory(issue) {
            const hardware = ['死机/重启', '通电黑屏', '后拉黑屏', '接口松动', '车充不亮灯'];
            const software = ['漏秒/未录制', '时间重置', 'carplay模式用不了', '连不上WiFi', 'GPS故障'];
            const accessories = ['支架不稳', '配件丢失', '接降压线异常', '内存卡报错'];
            if (hardware.includes(issue)) return '核心硬件故障';
            if (software.includes(issue)) return '固件与软件Bug';
            if (accessories.includes(issue)) return '配件及组装';
            return '画质与功能表现';
        }

        const bgPlugin = { id: 'bg', beforeDraw: (c) => { const ctx = c.ctx; ctx.save(); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,c.width,c.height); ctx.restore(); } };

        // 初始化图表对象
        let barChart = new Chart(document.getElementById('barChart').getContext('2d'), { type: 'bar', data: { labels: issues, datasets: models.map((m, i) => ({ label: m, data: Array(issues.length).fill(0), backgroundColor: modelColors[i] })) }, options: { scales: { y: { beginAtZero: true } }, responsive: true }, plugins: [bgPlugin] });
        let pieChart = new Chart(document.getElementById('pieChart').getContext('2d'), { type: 'pie', data: { labels: ['核心硬件故障', '固件与软件Bug', '配件及组装', '画质与功能表现'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#e74c3c', '#f1c40f', '#e67e22', '#34495e'] }] }, plugins: [bgPlugin] });
        let lineChart = new Chart(document.getElementById('lineChart').getContext('2d'), { type: 'line', data: { labels: months, datasets: [{ label: '全系总客诉量', data: Array(12).fill(0), borderColor: '#3498db', tension: 0.1 }] }, options: { scales: { y: { beginAtZero: true } } }, plugins: [bgPlugin] });

        // --- 核心逻辑：渲染图表 ---
        function renderCharts() {
            const selectedMonth = document.getElementById('monthFilter').value;
            document.getElementById('barTitle').innerText = selectedMonth === '全部' ? '多型号 SKU 客诉矩阵对比 (全年累计)' : `多型号 SKU 客诉矩阵对比 (${selectedMonth} 数据)`;
            document.getElementById('pieTitle').innerText = selectedMonth === '全部' ? '核心差评原因归类占比 (全年累计)' : `核心差评原因归类占比 (${selectedMonth} 数据)`;

            // 1. 筛选数据
            const filteredRecords = selectedMonth === '全部' ? allRecords : allRecords.filter(r => r.month === selectedMonth);

            // 2. 更新柱状图 (按型号+问题统计)
            const barData = models.map(() => Array(issues.length).fill(0));
            filteredRecords.forEach(r => {
                const mIdx = models.indexOf(r.model);
                const iIdx = issues.indexOf(r.issue);
                if (mIdx > -1 && iIdx > -1) barData[mIdx][iIdx] += r.count;
            });
            barChart.data.datasets.forEach((ds, i) => ds.data = barData[i]);
            barChart.update();

            // 3. 更新扇形图 (按分类统计)
            const pieDataMap = { '核心硬件故障': 0, '固件与软件Bug': 0, '配件及组装': 0, '画质与功能表现': 0 };
            filteredRecords.forEach(r => { pieDataMap[getIssueCategory(r.issue)] += r.count; });
            pieChart.data.datasets[0].data = Object.values(pieDataMap);
            pieChart.update();

            // 4. 更新曲线图 (永远展示全年的每月走势)
            const lineData = Array(12).fill(0);
            allRecords.forEach(r => {
                const monthIdx = months.indexOf(r.month);
                if (monthIdx > -1) lineData[monthIdx] += r.count;
            });
            lineChart.data.datasets[0].data = lineData;
            lineChart.update();
        }

        // --- 自动报告生成器 ---
        function generateReport() {
            if (allRecords.length === 0) return alert("暂无数据，请先导入表格或手动录入！");
            
            let totalComplaints = 0;
            let modelCount = {};
            let issueCount = {};
            let monthCount = {};

            allRecords.forEach(r => {
                totalComplaints += r.count;
                modelCount[r.model] = (modelCount[r.model] || 0) + r.count;
                issueCount[r.issue] = (issueCount[r.issue] || 0) + r.count;
                monthCount[r.month] = (monthCount[r.month] || 0) + r.count;
            });

            const worstModel = Object.keys(modelCount).reduce((a, b) => modelCount[a] > modelCount[b] ? a : b);
            const worstIssue = Object.keys(issueCount).reduce((a, b) => issueCount[a] > issueCount[b] ? a : b);
            const worstMonth = Object.keys(monthCount).reduce((a, b) => monthCount[a] > monthCount[b] ? a : b);
            const hardwarePercent = ((allRecords.filter(r => getIssueCategory(r.issue) === '核心硬件故障').reduce((sum, r) => sum + r.count, 0) / totalComplaints) * 100).toFixed(1);

            const reportHtml = `
                <p>💡 <b>整体概况：</b>系统共统计到 <b>${totalComplaints}</b> 条有效售后记录。客诉爆发最高峰出现在 <b>${worstMonth}</b>（共计 ${monthCount[worstMonth]} 条）。</p>
                <p>🚨 <b>需重点关注型号：</b>在全系产品中，表现最不稳定的型号是 <b>${worstModel}</b>，累计收到 ${modelCount[worstModel]} 条投诉，建议立刻排查该 SKU 的近期供应链批次与质检报告。</p>
                <p>🔧 <b>核心致命缺陷：</b>用户反馈最剧烈的痛点是 <b>“${worstIssue}”</b>（共发生 ${issueCount[worstIssue]} 次）。此外，归属于“核心硬件故障”的问题占比高达 <b>${hardwarePercent}%</b>，证明主板或排线等物理硬件仍是我们降低退单率的最大阻碍。</p>
                <p>📌 <b>运营优化建议：</b>针对“${worstIssue}”，建议前端运营立即在 Listing 的 Q&A 和 A+ 页面增加相关防雷说明或排障指导视频；后端协同工厂在下一批次产品中定向解决该缺陷。</p>
            `;
            document.getElementById('reportContent').innerHTML = reportHtml;
            document.getElementById('reportBox').style.display = 'block';
        }

        // --- 处理 Excel 导入 ---
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            document.getElementById('uploadStatus').innerText = "正在解析数据中...";
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    let successCount = 0;

                    jsonData.forEach(row => {
                        const month = row['月份'] ? row['月份'].toString().trim() : '2月'; // 没填月份默认2月
                        const model = row['型号'] ? row['型号'].toString().trim() : null;
                        const issue = row['问题类型'] ? row['问题类型'].toString().trim() : null;
                        const count = row['数量'] ? parseInt(row['数量']) : 1;

                        if (model && issue) {
                            allRecords.push({ month, model, issue, count });
                            successCount++;
                        }
                    });

                    renderCharts(); // 重新渲染图表
                    document.getElementById('uploadStatus').innerHTML = `✅ 导入成功！共载入 <b>${successCount}</b> 条数据。您现在可以切换月份查看了。`;
                    document.getElementById('uploadStatus').style.color = "#27ae60";
                } catch (
