<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>IIWEY AI 精准开发 & CRM 工作站 (修复版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-text { background: linear-gradient(to right, #2DD4BF, #3B82F6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .error-shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-8 font-sans" onload="loadHistory()">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-slate-800 border border-slate-700 rounded-3xl shadow-2xl p-6 md:p-8">
            <header class="mb-8 flex justify-between items-center border-b border-slate-700 pb-4">
                <div>
                    <h1 class="text-3xl font-black gradient-text">AI Outreach Hub</h1>
                    <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] mt-1">Apify Driven | Semantic Analysis | History Tracking</p>
                </div>
                <div id="apiIndicator" class="text-[10px] font-mono text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-700">API Status: Ready</div>
            </header>

            <div class="grid lg:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <div class="space-y-3">
                        <label class="block text-[10px] font-bold text-teal-400 uppercase tracking-widest">1. 粘贴达人视频链接</label>
                        <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@user/video/..." 
                               class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none focus:border-teal-500 transition-all">
                        
                        <label class="block text-[10px] font-bold text-blue-400 uppercase tracking-widest">2. 粘贴 IIWEY 产品链接</label>
                        <input type="text" id="prodUrl" placeholder="粘贴 Amazon 或 TikTok Shop 产品链接..." 
                               class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition-all">
                    </div>

                    <button onclick="runAIEngine()" id="runBtn" class="w-full bg-gradient-to-r from-teal-500 to-blue-600 py-4 rounded-2xl font-black text-lg hover:brightness-110 active:scale-95 transition-all shadow-lg disabled:opacity-50">
                        深度剖析并生成模板 ✨
                    </button>
                </div>

                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 flex flex-col min-h-[400px] relative overflow-hidden">
                    <div id="loader" class="hidden absolute inset-0 bg-slate-900/95 z-20 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm">
                        <div class="w-10 h-10 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                        <p class="mt-4 text-xs font-bold text-teal-400 animate-pulse uppercase tracking-widest text-center">正在通过 Apify 卫星分析...<br><span class="text-[10px] text-slate-500 mt-2 font-normal">请确保网络连接正常</span></p>
                    </div>

                    <div id="outreachBox" class="text-sm text-slate-400 leading-relaxed whitespace-pre-wrap font-mono flex-1 overflow-y-auto italic pr-2">
                        等待 AI 提取达人视频特征...
                    </div>
                    
                    <button id="copyBtn" onclick="copyCurrent()" class="hidden mt-6 bg-slate-800 hover:bg-slate-700 text-teal-400 py-3 rounded-xl text-xs font-bold border border-teal-900/30 transition-all">
                        复制当前定制模板 📋
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold flex items-center gap-2 text-slate-300">
                    <span class="text-teal-500">📁</span> 历史联系记录 (CRM)
                </h2>
                <button onclick="clearAll()" class="text-[10px] text-red-500 hover:underline">清空记录</button>
            </div>
            <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <script>
        // 🔴 重要：在此处填入你的 APIFY_TOKEN
        const APIFY_TOKEN = "apify_api_xyvo38EW3IkZR9UZWbuinaZvxMvVyk40ebT1"; 

        async function runAIEngine() {
            const vUrl = document.getElementById('videoUrl').value.trim();
            const pUrl = document.getElementById('prodUrl').value.trim();
            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loader');
            const box = document.getElementById('outreachBox');

            if (!vUrl || !pUrl) { alert("请同时输入视频链接和产品链接！"); return; }
            if (APIFY_TOKEN.includes("你的")) { alert("请先在代码内填入 APIFY Token！"); return; }

            loader.classList.remove('hidden');
            btn.disabled = true;
            box.innerText = "";

            try {
                // 使用官方推荐的同步 API 端点，URL 参数包含 Token 避开某些 CORS 限制
                const endpoint = `https://api.apify.com/v2/acts/clockworks~tiktok-scraper/run-sync-get-dataset?token=${APIFY_TOKEN}`;
                
                // 方案一修改点：精简 Request Body 和 Headers
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        postURLs: [vUrl],
                        resultsPerPage: 1,
                        shouldDownloadVideos: false,
                        shouldDownloadCovers: false
                    })
                });

                if (!response.ok) {
                    if(response.status === 401) throw new Error("Token 无效，请重新从 Apify 复制");
                    if(response.status === 403) throw new Error("额度已耗尽或被防火墙拦截");
                    throw new Error("服务器返回错误: " + response.status);
                }

                const data = await response.json();
                if (!data || data.length === 0) throw new Error("API 未能抓取到视频数据，请确认链接有效");

                const v = data[0];
                const result = buildTemplate(v, pUrl);

                box.innerText = result.template;
                box.classList.remove('italic', 'text-slate-400');
                document.getElementById('copyBtn').classList.remove('hidden');

                saveHistory({
                    id: Date.now(),
                    handle: v.authorMeta.name || "Creator",
                    product: result.productName,
                    template: result.template,
                    date: new Date().toLocaleString()
                });

            } catch (err) {
                console.error("Fetch Error:", err);
                box.innerHTML = `<span class="text-red-400 font-bold">❌ 错误: ${err.message}</span>\n\n<span class="text-slate-500 text-xs">可能原因：\n1. 网络连接受限（请尝试切换网络环境）\n2. Token 或额度问题\n3. 视频链接不支持（如私密视频）</span>`;
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function buildTemplate(v, pUrl) {
            const handle = v.authorMeta.name || "there";
            const caption = (v.text || "").toLowerCase();
            const lowP = pUrl.toLowerCase();

            // 产品深度分析逻辑
            let productName = "IIWEY Dash Cam";
            let productUSP = "superior Sony sensor for night vision and stable loop recording.";
            if (lowP.includes('n5') || lowP.includes('3-channel')) {
                productName = "IIWEY N5 (3-Channel)";
                productUSP = "3-way coverage (Front/Cabin/Rear) which effectively captures the cabin and side windows—a major safety upgrade.";
            } else if (lowP.includes('carplay') || lowP.includes('screen')) {
                productName = "Wireless CarPlay Display";
                productUSP = "zero-lag wireless connectivity and 4K recording, ideal for modernizing older vehicles.";
            }

            // 语义化内容生成
            let dynamicHook = `I saw your recent content and the engagement was impressive! Your car community clearly loves your style.`;
            if (caption.includes('asmr') || caption.includes('setup')) {
                dynamicHook = `The POV interior aesthetics and cinematic flow in your recent video are incredible. Your eye for detail is top-tier.`;
            } else if (caption.includes('review') || caption.includes('test')) {
                dynamicHook = `Your technical review depth is impressive. I saw your recent hardware test and really value your honest feedback.`;
            }

            const template = `Subject: Collaboration: A perfect fit for your channel style? (Idea for ${handle})

Hi ${handle},

${dynamicHook}

I'm from IIWEY, and looking at the car gear you feature, I'm confident our ${productName} would be a great upgrade for your content. Why it fits your style:

1. ${productUSP}
2. It addresses real-world needs—${caption.includes('asmr') ? 'its minimalist design won\'t ruin your cabin aesthetic' : 'its true 4K clarity is perfect for hardware enthusiasts'}.
3. We offer a free premium unit + professional commission.

Are you open to an honest "Side-by-Side" test? We give you full creative freedom.

Best regards,

[Your Name]
IIWEY Partnerships`;

            return { template, productName };
        }

        // --- CRM 存储逻辑 ---
        function saveHistory(record) {
            let history = JSON.parse(localStorage.getItem('iiwey_v4_history') || '[]');
            history.unshift(record);
            localStorage.setItem('iiwey_v4_history', JSON.stringify(history.slice(0, 50)));
            loadHistory();
        }

        function loadHistory() {
            const container = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('iiwey_v4_history') || '[]');
            if (history.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-xs italic col-span-full text-center py-10">暂无历史记录</p>`;
                return;
            }
            container.innerHTML = history.map(item => `
                <div class="bg-slate-900 border border-slate-700 p-4 rounded-2xl hover:border-teal-500/50 transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-bold text-teal-400">@${item.handle}</span>
                        <button onclick="deleteItem(${item.id})" class="text-slate-600 hover:text-red-500">✕</button>
                    </div>
                    <div class="text-[10px] text-slate-500 mb-2">${item.date} | 📦 ${item.product}</div>
                    <div class="flex gap-2">
                        <button onclick="reloadItem(${item.id})" class="flex-1 bg-slate-800 text-[10px] py-2 rounded-lg hover:bg-slate-700">查看</button>
                        <button onclick="copyOld(${item.id})" class="flex-1 bg-teal-900/20 text-teal-400 text-[10px] py-2 rounded-lg border border-teal-500/20">复制</button>
                    </div>
                </div>
            `).join('');
        }

        function reloadItem(id) {
            const history = JSON.parse(localStorage.getItem('iiwey_v4_history') || '[]');
            const item = history.find(i => i.id === id);
            if (item) {
                const box = document.getElementById('outreachBox');
                box.innerText = item.template;
                box.classList.remove('italic', 'text-slate-400');
                document.getElementById('copyBtn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function copyOld(id) {
            const history = JSON.parse(localStorage.getItem('iiwey_v4_history') || '[]');
            const item = history.find(i => i.id === id);
            if (item) { navigator.clipboard.writeText(item.template); alert("已复制该模板！"); }
        }

        function deleteItem(id) {
            let history = JSON.parse(localStorage.getItem('iiwey_v4_history') || '[]');
            history = history.filter(i => i.id !== id);
            localStorage.setItem('iiwey_v4_history', JSON.stringify(history));
            loadHistory();
        }

        function clearAll() {
            if(confirm("清空所有历史吗？")) { localStorage.removeItem('iiwey_v4_history'); loadHistory(); }
        }

        function copyCurrent() {
            navigator.clipboard.writeText(document.getElementById('outreachBox').innerText);
            alert("当前模板已复制！");
        }
    </script>
</body>
</html>
